name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudmountain-production
  cancel-in-progress: false

jobs:
  quality:
    name: Check and build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality gate
        run: npm run check

      - name: Save production bundle
        uses: actions/upload-artifact@v4
        with:
          name: cloudmountain-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy to Tencent Cloud
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
      DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
      PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Download production bundle
        uses: actions/download-artifact@v4
        with:
          name: cloudmountain-${{ github.sha }}
          path: dist

      - name: Validate deployment configuration
        shell: bash
        run: |
          set -euo pipefail
          required=(SERVER_HOST SERVER_PORT SERVER_USER SSH_PRIVATE_KEY SSH_KNOWN_HOSTS DEPLOY_PATH PRODUCTION_URL)
          for variable in "${required[@]}"; do
            if [[ -z "${!variable:-}" ]]; then
              echo "Missing production configuration: ${variable}" >&2
              exit 1
            fi
          done
          if [[ ! "${SERVER_PORT}" =~ ^[0-9]+$ ]]; then
            echo "SERVER_PORT must be numeric" >&2
            exit 1
          fi
          if [[ "${DEPLOY_PATH}" != "/www/wwwroot/cloudmountain-deploy" && "${DEPLOY_PATH}" != "/var/www/cloudmountain" ]]; then
            echo "DEPLOY_PATH is not an approved Cloud Mountain deployment directory" >&2
            exit 1
          fi
          test -f dist/index.html

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          install -d -m 700 "${HOME}/.ssh"
          printf '%s\n' "${SSH_PRIVATE_KEY}" > "${HOME}/.ssh/cloudmountain_deploy"
          printf '%s\n' "${SSH_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 600 "${HOME}/.ssh/cloudmountain_deploy" "${HOME}/.ssh/known_hosts"

      - name: Upload release
        id: release
        shell: bash
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA:0:7}"
          release_id="${GITHUB_RUN_NUMBER}-${short_sha}"
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh_options=(-i "${HOME}/.ssh/cloudmountain_deploy" -p "${SERVER_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          ssh "${ssh_options[@]}" "${remote}" bash -s -- "${DEPLOY_PATH}" "${release_id}" <<'REMOTE'
          set -euo pipefail
          deploy_path="$1"
          release_id="$2"
          [[ "${deploy_path}" == "/www/wwwroot/cloudmountain-deploy" || "${deploy_path}" == "/var/www/cloudmountain" ]]
          [[ "${release_id}" =~ ^[0-9]+-[0-9a-f]{7}$ ]]
          install -d -m 755 "${deploy_path}/releases/${release_id}"
          REMOTE

          rsync --archive --compress --delete \
            -e "ssh -i ${HOME}/.ssh/cloudmountain_deploy -p ${SERVER_PORT} -o BatchMode=yes -o StrictHostKeyChecking=yes" \
            dist/ "${remote}:${DEPLOY_PATH}/releases/${release_id}/"

          previous_release="$(ssh "${ssh_options[@]}" "${remote}" "readlink -f '${DEPLOY_PATH}/current' 2>/dev/null || true")"
          {
            echo "release_id=${release_id}"
            echo "previous_release=${previous_release}"
          } >> "${GITHUB_OUTPUT}"

      - name: Activate release
        shell: bash
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          set -euo pipefail
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh -i "${HOME}/.ssh/cloudmountain_deploy" -p "${SERVER_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${remote}" bash -s -- "${DEPLOY_PATH}" "${RELEASE_ID}" <<'REMOTE'
          set -euo pipefail
          deploy_path="$1"
          release_id="$2"
          release_path="${deploy_path}/releases/${release_id}"
          [[ "${deploy_path}" == "/www/wwwroot/cloudmountain-deploy" || "${deploy_path}" == "/var/www/cloudmountain" ]]
          [[ "${release_id}" =~ ^[0-9]+-[0-9a-f]{7}$ ]]
          test -s "${release_path}/index.html"
          rm -f "${deploy_path}/current.next"
          ln -s "${release_path}" "${deploy_path}/current.next"
          mv -Tf "${deploy_path}/current.next" "${deploy_path}/current"
          REMOTE

      - name: Verify production and roll back on failure
        shell: bash
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          PREVIOUS_RELEASE: ${{ steps.release.outputs.previous_release }}
        run: |
          set -euo pipefail
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh_options=(-i "${HOME}/.ssh/cloudmountain_deploy" -p "${SERVER_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes)

          verify() {
            homepage="$(curl --fail --silent --show-error --location --retry 4 --retry-delay 2 "${PRODUCTION_URL}/?deployment=${RELEASE_ID}")"
            grep -q 'id="root"' <<< "${homepage}"
            curl --fail --silent --show-error --location --retry 4 --retry-delay 2 \
              --output /dev/null "${PRODUCTION_URL}/programs/overview?deployment=${RELEASE_ID}"
            asset_path="$(grep -oE 'src="[^"]+\.js"' <<< "${homepage}" | head -n 1 | cut -d '"' -f 2)"
            [[ -n "${asset_path}" ]]
            if [[ "${asset_path}" =~ ^https?:// ]]; then
              asset_url="${asset_path}"
            else
              asset_url="${PRODUCTION_URL%/}/${asset_path#/}"
            fi
            curl --fail --silent --show-error --location --retry 4 --retry-delay 2 \
              --output /dev/null "${asset_url}"
          }

          if ! verify; then
            echo "Production verification failed; restoring the previous release" >&2
            if [[ -z "${PREVIOUS_RELEASE}" ]]; then
              echo "No previous release is available for rollback" >&2
              exit 1
            fi
            ssh "${ssh_options[@]}" "${remote}" bash -s -- "${DEPLOY_PATH}" "${PREVIOUS_RELEASE}" <<'REMOTE'
            set -euo pipefail
            deploy_path="$1"
            previous_release="$2"
            [[ "${deploy_path}" == "/www/wwwroot/cloudmountain-deploy" || "${deploy_path}" == "/var/www/cloudmountain" ]]
            [[ "${previous_release}" == "${deploy_path}/releases/"* ]]
            test -s "${previous_release}/index.html"
            rm -f "${deploy_path}/current.rollback"
            ln -s "${previous_release}" "${deploy_path}/current.rollback"
            mv -Tf "${deploy_path}/current.rollback" "${deploy_path}/current"
            REMOTE
            exit 1
          fi

      - name: Remove old releases
        shell: bash
        env:
          PREVIOUS_RELEASE: ${{ steps.release.outputs.previous_release }}
        run: |
          set -euo pipefail
          remote="${SERVER_USER}@${SERVER_HOST}"
          ssh -i "${HOME}/.ssh/cloudmountain_deploy" -p "${SERVER_PORT}" -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "${remote}" bash -s -- "${DEPLOY_PATH}" "${PREVIOUS_RELEASE}" <<'REMOTE'
          set -euo pipefail
          deploy_path="$1"
          previous_release="$2"
          [[ "${deploy_path}" == "/www/wwwroot/cloudmountain-deploy" || "${deploy_path}" == "/var/www/cloudmountain" ]]
          current_release="$(readlink -f "${deploy_path}/current")"
          find "${deploy_path}/releases" -mindepth 1 -maxdepth 1 -type d -printf '%T@ %p\n' \
            | sort -rn \
            | awk 'NR > 5 {sub(/^[^ ]+ /, ""); print}' \
            | while IFS= read -r old_release; do
                if [[ "${old_release}" != "${current_release}" && "${old_release}" != "${previous_release}" ]]; then
                  rm -rf -- "${old_release}"
                fi
              done
          REMOTE

      - name: Write deployment summary
        if: success()
        shell: bash
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          {
            echo "## Production deployment"
            echo "- Release: \`${RELEASE_ID}\`"
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- URL: ${PRODUCTION_URL}"
            echo "- Health check: passed"
          } >> "${GITHUB_STEP_SUMMARY}"
